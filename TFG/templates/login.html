<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(120deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  border-radius: 20px;
  padding: 30px;
}
</style>

</head>
<body>

<div class="card shadow-lg" style="width: 350px;">
  <h3 class="text-center mb-3">🔐 Login</h3>

  <form method="POST">
    <input class="form-control mb-3" type="email" name="email" placeholder="Correo" required>
    <input class="form-control mb-3" type="password" name="password" placeholder="Contraseña" required>
    <button class="btn btn-primary w-100">Entrar</button>
  </form>

  <p class="text-center mt-3">
    <a href="/register">Crear cuenta</a>
  </p>
</div>

</body>
</html>
