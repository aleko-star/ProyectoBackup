<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente moderna -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 380px;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  border: none;
}

.title {
  text-align: center;
  font-weight: 700;
  margin-bottom: 20px;
}

.btn-custom {
  border-radius: 30px;
  padding: 10px;
  font-weight: 500;
}

.input {
  border-radius: 12px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="card bg-white">

  <h3 class="title">📝 Crear cuenta</h3>

  <form method="POST">

    <input class="form-control input mb-3" type="email" name="email" placeholder="Correo electrónico" required>

    <input class="form-control input mb-3" type="password" name="password" placeholder="Contraseña" required>

    <button class="btn btn-success w-100 btn-custom">Registrarme</button>

  </form>

  <p class="text-center mt-3">
    ¿Ya tienes cuenta?
    <a href="/login">Inicia sesión</a>
  </p>

</div>

</body>
</html>
