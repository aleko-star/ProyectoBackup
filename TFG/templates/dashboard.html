<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Backups</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  min-height: 100vh;
}

.card {
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  border: none;
}

.file-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f8f9fa;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  transition: 0.3s;
}

.file-item:hover {
  transform: scale(1.02);
  background: #e9ecef;
}

.btn-custom {
  border-radius: 20px;
}
</style>
</head>

<body>

<div class="container mt-5">
  <div class="row justify-content-center">

    <div class="col-md-8">

      <div class="card p-4">

        <h2 class="text-center mb-4">☁️ Mis Backups</h2>

        <!-- SUBIR ARCHIVO -->
        <form method="POST" action="/upload" enctype="multipart/form-data" class="mb-4">
          <div class="input-group">
            <input type="file" class="form-control" name="file" required>
            <button class="btn btn-primary btn-custom">Subir</button>
          </div>
        </form>

        <hr>

        <!-- LISTA DE BACKUPS -->
        <h5 class="mb-3">📁 Tus archivos</h5>

        {% if backups and backups|length > 0 %}

          {% for b in backups %}
          <div class="file-item">

            <span>📄 {{ b[2] }}</span>

            <div>
              <!-- DESCARGAR -->
              <a href="/download/{{ b[0] }}" class="btn btn-success btn-sm btn-custom">
                Descargar
              </a>

              <!-- BORRAR -->
              <a href="/delete/{{ b[0] }}" class="btn btn-danger btn-sm btn-custom">
                Borrar
              </a>
            </div>

          </div>
          {% endfor %}

        {% else %}

          <p class="text-center text-muted">
            No tienes backups todavía ☁️
          </p>

        {% endif %}

      </div>

    </div>

  </div>
</div>

</body>
</html>
